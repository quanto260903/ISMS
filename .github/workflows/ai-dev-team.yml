name: AI Development Workflow

on:
  workflow_dispatch:

jobs:

  repo-analysis:
    name: Repo Analyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Repo Analyzer
        uses: ai/agent-runner@v1
        with:
          agent: repo-analyzer

  analysis:
    name: Business Analysis
    runs-on: ubuntu-latest
    needs: repo-analysis
    steps:
      - uses: actions/checkout@v4

      - name: Run Analyst
        uses: ai/agent-runner@v1
        with:
          agent: analyst

  planning:
    name: Project Planning
    runs-on: ubuntu-latest
    needs: analysis
    steps:
      - uses: actions/checkout@v4

      - name: Run Project Manager
        uses: ai/agent-runner@v1
        with:
          agent: project-manager

  architecture:
    name: Architecture Design
    runs-on: ubuntu-latest
    needs: planning
    steps:
      - uses: actions/checkout@v4

      - name: Run Architect
        uses: ai/agent-runner@v1
        with:
          agent: architect

  development:
    name: Development
    runs-on: ubuntu-latest
    needs: architecture
    steps:
      - uses: actions/checkout@v4

      - name: Run Developer
        uses: ai/agent-runner@v1
        with:
          agent: developer

  testing:
    name: QA Review
    runs-on: ubuntu-latest
    needs: development
    steps:
      - uses: actions/checkout@v4

      - name: Run QA
        uses: ai/agent-runner@v1
        with:
          agent: qa